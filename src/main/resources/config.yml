database:
  type: sqlite # sqlite, mysql, postgresql
  # Настройки пула соединений, если не знаете что это рекомендуется не менять
  hikari:
    max-pool-size: 10
    keep-alive: 120000
    idle-timeout: 60000
    connection-timeout: 30000
    max-life-time: 1800000

  # Параметры подключения к MySQL/Postgres
  connection:
    host: localhost
    port: 3306
    database: rseller
    username: "username"
    password: "password"

settings:
  # Название такое же как у файла меню только без .yml
  first-open-menu: "MAIN_MENU"
  blocking-sell:
    type: false # false - чёрный список, true белый список
    world-list:
      - 'example1'
      - 'example2'
  update-check: true # Проверка обновлений плагина
  metrics: true # Отправка анонимной статистики https://bstats.org/plugin/bukkit/rSeller/25999



messages:
  reload:
    all: ""
    menus: ""
